name: Docker Build

on:
  push:
    paths:
      - '**'
      - '.github/workflows/docker-build.yml'
  pull_request:
    paths:
      - '**'

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t agent-safety-monitor:test .
