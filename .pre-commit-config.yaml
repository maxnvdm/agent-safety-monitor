repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check .
        language: system
        types: [python]
        pass_filenames: false

      - id: ruff-format
        name: ruff format (check)
        entry: uv run ruff format --check .
        language: system
        types: [python]
        pass_filenames: false

      - id: mypy
        name: mypy
        entry: uv run mypy .
        language: system
        types: [python]
        pass_filenames: false

      - id: bandit
        name: bandit
        entry: uv run bandit -r . --exclude ./tests,./build,./.venv
        language: system
        types: [python]
        pass_filenames: false
